<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comissão Bíblico-Catequética</title>
    <link rel="stylesheet" href="css/01-variaveis.css">
    <link rel="stylesheet" href="css/02-reset.css">
    <link rel="stylesheet" href="css/03-utilitarios.css">
    <link rel="stylesheet" href="css/04-layout.css">
    <link rel="stylesheet" href="css/05-componentes.css">
    <link rel="stylesheet" href="css/06-formularios.css">
    <link rel="stylesheet" href="css/07-tabelas.css">
    <link rel="stylesheet" href="css/08-relatorios.css">
    <link rel="stylesheet" href="css/09-responsivo.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#7a2b2b">

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>

<body class="fonte-padrao fundo-cinza cor-texto-escuro antialiased h-total w-total">

    <div id="aplicacao" class="w-total min-h-100vh rolagem-oculta pos-relativa">
        <div id="pagina-inicio" class="flex flex-coluna itens-centro justifica-centro h-tela w-tela fundo-cinza p-md">
            <div class="cartao-inicial">
                <img src="marca-comissao-desenho.svg" alt="Desenho da Comissão Bíblico-Catequética"
                    class="logo-inicial">
                <h1 class="texto-xl peso-bold cor-texto-primario mb-sm">Comissão Bíblico-Catequética</h1>
                <p class="texto-md cor-texto-claro mb-lg">Gestão de cursos, participantes e finanças</p>
                <button class="botao-padrao botao-primario active-fundo-marca-ativo w-total"
                    onclick="irParaAdministracao()">
                    Painel de Administração
                </button>
            </div>
        </div>

        <div id="pagina-administracao" class="w-tela h-tela fundo-cinza flex flex-linha md-flex-coluna oculto">

            <aside class="barra-lateral fundo-cinza flex flex-coluna justifica-inicio p-md md-w-total">
                <nav
                    class="navegacao-principal flex flex-coluna gap-sm rolagem-y md-flex-linha md-rolagem-x md-p-0 pb-md">
                    <div class="item-menu indicador-lateral-ativo" data-aba="cursos" onclick="trocarAba('cursos')">
                        <span class="icone-inline" data-icone="cursos" aria-hidden="true"></span>Cursos
                    </div>

                    <div class="item-menu indicador-lateral-ativo" data-aba="palestrantes"
                        onclick="trocarAba('palestrantes')">
                        <span class="icone-inline" data-icone="palestrantes" aria-hidden="true"></span>Palestrantes
                    </div>

                    <div class="item-menu indicador-lateral-ativo" data-aba="disciplinas"
                        onclick="trocarAba('disciplinas')">
                        <span class="icone-inline" data-icone="disciplinas" aria-hidden="true"></span>Disciplinas
                    </div>

                    <div class="item-menu indicador-lateral-ativo" data-aba="paroquias"
                        onclick="trocarAba('paroquias')">
                        <span class="icone-inline" data-icone="paroquias" aria-hidden="true"></span>Paróquias
                    </div>

                    <div class="item-menu indicador-lateral-ativo" data-aba="participantes"
                        onclick="trocarAba('participantes')">
                        <span class="icone-inline" data-icone="participantes" aria-hidden="true"></span>Participantes
                    </div>

                    <div class="item-menu indicador-lateral-ativo" data-aba="frequencia"
                        onclick="trocarAba('frequencia')">
                        <span class="icone-inline" data-icone="frequencia" aria-hidden="true"></span>Frequência
                    </div>

                    <div class="item-menu indicador-lateral-ativo" data-aba="atividades"
                        onclick="trocarAba('atividades')">
                        <span class="icone-inline" data-icone="atividades" aria-hidden="true"></span>Atividades
                    </div>

                    <div class="item-menu indicador-lateral-ativo" data-aba="financas" onclick="trocarAba('financas')">
                        <span class="icone-inline" data-icone="financas" aria-hidden="true"></span>Finanças
                    </div>

                    <div class="item-menu indicador-lateral-ativo" data-aba="pagamentos"
                        onclick="trocarAba('pagamentos')">
                        <span class="icone-inline" data-icone="pagamentos" aria-hidden="true"></span>Pagamentos
                    </div>


                    <div class="item-menu indicador-lateral-ativo" data-aba="relatorios"
                        onclick="trocarAba('relatorios')">
                        <span class="icone-inline" data-icone="relatorios" aria-hidden="true"></span>Relatórios
                    </div>

                    <div class="item-menu indicador-lateral-ativo" data-aba="avisos" onclick="trocarAba('avisos')">
                        <span class="icone-inline" data-icone="avisos" aria-hidden="true"></span>Avisos
                    </div>

                    <div class="item-menu indicador-lateral-ativo" data-aba="dados" onclick="trocarAba('dados')">
                        <span class="icone-inline" data-icone="dados" aria-hidden="true"></span>Dados
                    </div>
                </nav>
            </aside>

            <main class="flex-1 p-md rolagem-y fundo-cinza md-p-md flex flex-coluna">
                <div id="conteudo-administracao" class="w-total"></div>
            </main>

            <button class="botao-padrao botao-flutuante botao-sair-discreto" onclick="sairAdministracao()" title="Sair"
                aria-label="Sair">
                <span class="icone-inline" data-icone="sair" aria-hidden="true"></span>
            </button>
        </div>

        <div id="janela-formulario"
            class="pos-fixa inset-0 flex fundo-sobreposicao itens-centro justifica-centro z-maximo p-lg rolagem-y oculto"
            role="dialog" aria-modal="true" aria-labelledby="titulo-janela" aria-hidden="true" tabindex="-1">
            <div class="janela-conteudo">
                <div
                    class="flex justifica-espaco itens-centro pb-md mb-lg borda-base-1 borda-base-solida borda-cor-padrao">
                    <h3 id="titulo-janela" class="texto-lg peso-bold cor-texto-primario">Formulário</h3>
                    <button class="botao-padrao botao-secundario botao-fechar-janela"
                        onclick="fecharJanela('janela-formulario')" aria-label="Fechar janela">
                        <span class="icone-inline" data-icone="cancelar" aria-hidden="true"></span>
                    </button>
                </div>
                <div id="conteudo-formulario" class="mb-lg"></div>
            </div>
        </div>

    </div>

    <button id="botao-topo" class="botao-padrao botao-flutuante botao-topo oculto" onclick="voltarAoTopo()"
        title="Voltar ao topo" aria-label="Voltar ao topo">
        <span class="icone-inline" data-icone="topo" aria-hidden="true"></span>
    </button>

    <script src="js/core/config.js"></script>
    <script src="js/core/estado.js"></script>
    <script src="js/core/banco-dados.js"></script>
    <script src="js/core/utilidades.js"></script>
    <script src="js/core/validacao.js"></script>
    <script src="js/core/componentes.js"></script>
    <script src="js/core/interface.js"></script>
    <script src="js/core/rotas.js"></script>
    <script src="js/cadastros/cursos.js"></script>
    <script src="js/cadastros/palestrantes.js"></script>
    <script src="js/cadastros/paroquias.js"></script>
    <script src="js/cadastros/disciplinas.js"></script>
    <script src="js/cadastros/participantes.js"></script>
    <script src="js/cadastros/participantes-cartoes.js"></script>
    <script src="js/cadastros/importacao-cadastros.js"></script>
    <script src="js/academico/frequencia-regras.js"></script>
    <script src="js/academico/frequencia-impressao.js"></script>
    <script src="js/academico/frequencia.js"></script>
    <script src="js/academico/atividades-regras.js"></script>
    <script src="js/academico/atividades.js"></script>
    <script src="js/financeiro/pagamentos-regras.js"></script>
    <script src="js/financeiro/pagamentos-recibos.js"></script>
    <script src="js/financeiro/pagamentos.js"></script>
    <script src="js/comunicacao/whatsapp.js"></script>
    <script src="js/comunicacao/avisos.js"></script>
    <script src="js/financeiro/financas-regras.js"></script>
    <script src="js/financeiro/financas-recibos.js"></script>
    <script src="js/financeiro/financas.js"></script>
    <script src="js/relatorios/relatorios-academico.js"></script>
    <script src="js/relatorios/relatorios-financeiro.js"></script>
    <script src="js/relatorios/relatorios-graficos.js"></script>
    <script src="js/relatorios/relatorios-dashboard.js"></script>
    <script src="js/relatorios/relatorios-ficha-participante.js"></script>
    <script src="js/relatorios/relatorios-pdf.js"></script>
    <script src="js/relatorios/relatorios.js"></script>
    <script src="js/dados/dados.js"></script>
</body>

</html>
