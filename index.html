<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escola Discípulo Amado</title>
    <link rel="stylesheet" href="estilo.css">
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>

<body>
    <div id="aplicacao" class="largura-total altura-total rolagem-oculta pos-relativa">

        <div id="pagina-inicio" class="pagina flex flex-coluna itens-centro justifica-centro altura-tela largura-tela fundo-cinza p-md">
            <div class="fundo-branco borda-padrao raio-md p-lg max-largura-md largura-total flex flex-coluna itens-centro texto-centro">
                <div class="mb-md" style="width: 64px; height: 64px;">
                    <svg viewBox="0 0 48 48" fill="none" class="largura-total altura-total">
                        <rect x="20" y="4" width="8" height="40" rx="2" fill="#1e3a8a" />
                        <rect x="8" y="14" width="32" height="8" rx="2" fill="#1e3a8a" />
                        <circle cx="24" cy="18" r="4" fill="#f0f4ff" />
                    </svg>
                </div>
                <h1 class="texto-xl peso-bold cor-texto-primario mb-sm">Escola Discípulo Amado</h1>
                <p class="texto-md cor-texto-claro mb-lg">Painel de Administração Acadêmica e Financeira</p>
                <button class="btn btn-primario largura-total" onclick="irParaAdministracao()">Entrar no Sistema</button>
            </div>
        </div>

        <div id="pagina-administracao" class="pagina largura-tela altura-tela fundo-cinza flex flex-linha md-flex-coluna oculto">
            
            <aside class="fundo-cinza md-sem-borda-direita md-borda-base flex flex-coluna justifica-inicio p-md lg-largura-barra md-largura-total" style="width: 240px; min-width: 240px;">
                
                <nav class="flex flex-coluna gap-sm rolagem-y md-flex-linha md-rolagem-x md-p-zero pb-md">
                    <div class="item-menu p-sm px-md raio-sm cursor-apontador transicao hover-fundo-secundario cor-texto-escuro texto-md" data-aba="cursos" onclick="trocarAba('cursos')"><span class="icone">&#xE7BE;</span>Cursos</div>
                    <div class="item-menu p-sm px-md raio-sm cursor-apontador transicao hover-fundo-secundario cor-texto-escuro texto-md" data-aba="palestrantes" onclick="trocarAba('palestrantes')"><span class="icone">&#xE720;</span>Palestrantes</div>
                    <div class="item-menu p-sm px-md raio-sm cursor-apontador transicao hover-fundo-secundario cor-texto-escuro texto-md" data-aba="disciplinas" onclick="trocarAba('disciplinas')"><span class="icone">&#xEA37;</span>Disciplinas</div>
                    <div class="item-menu p-sm px-md raio-sm cursor-apontador transicao hover-fundo-secundario cor-texto-escuro texto-md" data-aba="paroquias" onclick="trocarAba('paroquias')"><span class="icone">&#xE80F;</span>Paróquias</div>
                    <div class="item-menu p-sm px-md raio-sm cursor-apontador transicao hover-fundo-secundario cor-texto-escuro texto-md" data-aba="participantes" onclick="trocarAba('participantes')"><span class="icone">&#xE716;</span>Participantes</div>
                    <div class="item-menu p-sm px-md raio-sm cursor-apontador transicao hover-fundo-secundario cor-texto-escuro texto-md" data-aba="frequencia" onclick="trocarAba('frequencia')"><span class="icone">&#xE917;</span>Frequência</div>
                    <div class="item-menu p-sm px-md raio-sm cursor-apontador transicao hover-fundo-secundario cor-texto-escuro texto-md" data-aba="atividades" onclick="trocarAba('atividades')"><span class="icone">&#xF0E3;</span>Atividades</div>
                    <div class="item-menu p-sm px-md raio-sm cursor-apontador transicao hover-fundo-secundario cor-texto-escuro texto-md" data-aba="pagamentos" onclick="trocarAba('pagamentos')"><span class="icone">&#xE8C7;</span>Pagamentos</div>
                    <div class="item-menu p-sm px-md raio-sm cursor-apontador transicao hover-fundo-secundario cor-texto-escuro texto-md" data-aba="avisos" onclick="trocarAba('avisos')"><span class="icone">&#xE789;</span>Avisos</div>
                    <div class="item-menu p-sm px-md raio-sm cursor-apontador transicao hover-fundo-secundario cor-texto-escuro texto-md" data-aba="financas" onclick="trocarAba('financas')"><span class="icone">&#xE825;</span>Finanças</div>
                    <div class="item-menu p-sm px-md raio-sm cursor-apontador transicao hover-fundo-secundario cor-texto-escuro texto-md" data-aba="relatorios" onclick="trocarAba('relatorios')"><span class="icone">&#xE9F9;</span>Relatórios</div>
                </nav>

                <div class="flex flex-coluna gap-sm pt-md borda-topo md-oculto">
                    <button class="btn btn-primario" onclick="exportarCopiaSeguranca()">Salvar Localmente</button>
                    <button class="btn btn-secundario" onclick="importarCopiaSeguranca()">Restaurar</button>
                    <button class="btn btn-secundario" onclick="sairAdministracao()">Sair</button>
                </div>
            </aside>

            <main class="flex-1 p-lg rolagem-y fundo-cinza md-p-md flex flex-coluna">
                <div id="conteudo-administracao" class="largura-total"></div>
            </main>
        </div>

        <div id="janela-formulario" class="pos-fixa inset-0 flex fundo-sobreposicao items-centro justifica-centro z-maximo oculto">
            <div class="fundo-branco borda-padrao raio-md p-lg largura-total max-largura-lg rolagem-y animacao-deslize flex flex-coluna" style="max-height: 90vh;">
                <div class="flex justifica-espaco itens-centro pb-md mb-lg borda-base">
                    <h3 id="titulo-janela" class="texto-lg peso-bold cor-texto-primario">Formulário</h3>
                    <button class="btn btn-secundario btn-pequeno" onclick="fecharJanela('janela-formulario')">✕</button>
                </div>
                <div id="conteudo-formulario" class="mb-lg"></div>
            </div>
        </div>

    </div>

    <script src="banco-dados.js"></script>
    <script src="js/01-base.js"></script>
    <script src="js/02-cursos.js"></script>
    <script src="js/03-paroquias.js"></script>
    <script src="js/04-palestrantes.js"></script>
    <script src="js/05-disciplinas.js"></script>
    <script src="js/06-participantes.js"></script>
    <script src="js/07-frequencia.js"></script>
    <script src="js/08-atividades.js"></script>
    <script src="js/09-pagamentos.js"></script>
    <script src="js/10-avisos.js"></script>
    <script src="js/11-financas.js"></script>
    <script src="js/12-relatorios.js"></script>
    <script src="js/13-salvamento-copia-seguranca.js"></script>
</body>

</html>
